version: '3.8'

services:
  db:
    image: postgres:15
    container_name: kadaima-db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: udaya96
      POSTGRES_DB: kadaimadb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: kadaima-api:latest
    container_name: kadaima-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://myuser:udaya96@db:5432/kadaimadb
    ports:
      - "80:4000"
    restart: always

volumes:
  pgdata:
